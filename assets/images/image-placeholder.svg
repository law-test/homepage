<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">법학경시대회 이미지 준비 중</title>
<desc id="desc">원본 이미지 파일이 연결되지 않은 경우 표시되는 대체 이미지입니다.</desc>
<rect width="1200" height="800" fill="#FAF7F0"/>
<rect x="40" y="40" width="1120" height="720" fill="none" stroke="#B8924E" stroke-width="4" stroke-dasharray="18 14"/>
<text x="600" y="350" text-anchor="middle" font-size="120" fill="#0F2847" font-family="serif">法</text>
<text x="600" y="435" text-anchor="middle" font-size="38" fill="#0F2847" font-family="sans-serif" font-weight="700">법학경시대회</text>
<text x="600" y="490" text-anchor="middle" font-size="24" fill="#7A7568" font-family="sans-serif">이미지 준비 중</text>
</svg>